
name: Push to allwpilib

on:
  workflow_dispatch:
  push:
jobs:
  move-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Download copybara
        run: |
          wget https://github.com/google/copybara/releases/download/v20250616/copybara_deploy.jar
          chmod +x copybara_deploy.jar
          
      - name: Configure committer identity
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: Configure Git credentials
        run: |
          git config --global url."https://${{ secrets.COPYBARA_TOKEN }}@github.com/".insteadOf "https://github.com/"
        
      - name: Run copybara
        run: java -jar copybara_deploy.jar migrate `pwd`/copy.bara.sky mostrobotpy_to_allwpilib
